<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Nirin Paint v13</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
#app{width:100%;height:100vh;min-height:500px;background:#050608;display:flex;flex-direction:column;font-family:monospace;overflow:hidden;user-select:none;}
#topbar{height:42px;flex-shrink:0;background:#0d0d18;border-bottom:1px solid rgba(0,255,180,0.15);display:flex;align-items:center;gap:6px;padding:0 10px;z-index:10;}
#topbar .logo{color:rgba(0,255,180,0.9);font-size:13px;font-weight:bold;letter-spacing:.1em;margin-right:10px;}
.tb-btn{background:rgba(0,255,180,0.07);border:1px solid rgba(0,255,180,0.2);color:rgba(0,255,180,0.75);font-size:12px;padding:4px 12px;cursor:pointer;border-radius:3px;letter-spacing:.05em;transition:all .15s;white-space:nowrap;}
.tb-btn:hover{background:rgba(0,255,180,0.15);border-color:rgba(0,255,180,0.5);}
.tb-btn:disabled{opacity:0.3;cursor:default;}
.tb-sep{width:1px;height:22px;background:rgba(0,255,180,0.12);margin:0 4px;}
#main{display:flex;flex:1;overflow:hidden;position:relative;}
#sidebar{width:130px;flex-shrink:0;background:#0b0b16;border-right:1px solid rgba(0,255,180,0.12);display:flex;flex-direction:column;gap:4px;padding:8px 6px;overflow-y:auto;z-index:10;}
.tool-btn{background:rgba(0,255,180,0.06);border:1px solid rgba(0,255,180,0.18);color:rgba(0,255,180,0.8);font-size:13px;padding:7px 8px;cursor:pointer;border-radius:3px;letter-spacing:.04em;transition:all .15s;text-align:left;display:flex;align-items:center;gap:7px;}
.tool-btn:hover{background:rgba(0,255,180,0.13);border-color:rgba(0,255,180,0.45);}
.tool-btn.active{background:rgba(0,255,180,0.2);border-color:rgba(0,255,180,0.85);color:#00ffb4;}
.sb-sep{height:1px;background:rgba(0,255,180,0.1);margin:3px 0;}
.sb-label{color:rgba(0,255,180,0.4);font-size:11px;padding:4px 3px 1px;letter-spacing:.05em;}
.sb-val{color:rgba(0,255,180,0.7);font-size:11px;text-align:right;}
.sb-row{display:flex;justify-content:space-between;align-items:center;padding:0 2px;}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:#050608;}
#canvas{position:absolute;top:0;left:0;z-index:2;}
#plasma-canvas{position:absolute;top:0;left:0;z-index:1;pointer-events:none;filter:blur(12px) saturate(1.8);will-change:transform;}
#statusbar{position:absolute;bottom:0;left:0;right:0;height:22px;background:rgba(8,8,13,0.85);border-top:1px solid rgba(0,255,180,0.08);color:rgba(0,255,180,0.35);font-size:10px;letter-spacing:.04em;display:flex;align-items:center;padding:0 8px;justify-content:space-between;pointer-events:none;z-index:3;}
input[type=range]{-webkit-appearance:none;background:rgba(0,255,180,0.1);height:4px;border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:rgba(0,255,180,0.9);border-radius:50%;cursor:pointer;box-shadow:0 0 5px rgba(0,255,180,0.5);}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="logo">NIRIN PAINT v13</span>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-new">⬜ Neu</button>
    <button class="tb-btn" id="btn-save">💾 Speichern</button>
    <button class="tb-btn" id="btn-load">📂 Laden</button>
    <button class="tb-btn" id="btn-export">↗ PNG Export</button>
    <div class="tb-sep"></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="color:rgba(0,255,180,0.5);font-size:10px;width:40px;">SIZE</span>
      <input type="range" id="size-slider" min="1" max="25" step="0.05" value="5" style="width:140px;">
      <span id="val-size" style="color:rgba(0,255,180,0.9);font-size:11px;width:30px;">25</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:10px;">
      <span style="color:rgba(0,255,180,0.5);font-size:10px;width:60px;">ZOOM-FIX</span>
      <input type="range" id="zoomfix-slider" min="0" max="100" step="1" value="50" style="width:100px;">
      <span id="val-zoomfix" style="color:rgba(0,255,180,0.9);font-size:11px;width:30px;">50%</span>
    </div>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-undo">↩ Undo</button>
    <button class="tb-btn" id="btn-redo">↪ Redo</button>
  </div>
  <div id="main">
    <div id="sidebar">
      <div class="sb-label">WERKZEUGE</div>
      <button class="tool-btn active" data-tool="pen">✏ Stift</button>
      <button class="tool-btn" data-tool="brush">◉ Pinsel</button>
      <button class="tool-btn" data-tool="plasma">🌌 Plasma</button>
      <button class="tool-btn" data-tool="eraser">◻ Radier</button>
      <div class="sb-sep"></div>
      <button class="tool-btn" data-tool="rect">▭ Rechteck</button>
      <button class="tool-btn" data-tool="circle">○ Kreis</button>
      <div class="sb-sep"></div>
      <div class="sb-label">ANSICHT</div>
      <div class="sb-row"><span class="sb-label">Zoom</span><span class="sb-val" id="zoom-display">1.00x</span></div>
      <button class="tool-btn" id="btn-reset-view" style="font-size:11px;">⌖ Reset View</button>
      <div class="sb-sep"></div>
      <button class="tool-btn" id="btn-clear" style="color:rgba(255,80,80,0.7);border-color:rgba(255,80,80,0.2);">⌫ Leeren</button>
    </div>
    <div id="canvas-wrap">
      <canvas id="plasma-canvas"></canvas>
      <canvas id="canvas"></canvas>
      <div id="statusbar">
        <span id="status-left">Bereit</span>
        <span id="status-right">Chunks: 0 | Zoom: 1.0000x</span>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false }); // Optimize: no alpha needed for main canvas
const wrap = document.getElementById('canvas-wrap');
const statusL = document.getElementById('status-left');
const statusR = document.getElementById('status-right');
const zoomDisp = document.getElementById('zoom-display');
const sizeSlider = document.getElementById('size-slider');
const zoomFixSlider = document.getElementById('zoomfix-slider');
const sizeLabel = document.getElementById('val-size');
const zoomFixLabel = document.getElementById('val-zoomfix');
const btnUndo = document.getElementById('btn-undo');
const btnRedo = document.getElementById('btn-redo');

// --- Plasma Background System (Restored from v10 for visuals) ---
const plasmaCanvas = document.getElementById('plasma-canvas');
const plasmaCtx = plasmaCanvas.getContext('2d');
const pOff = document.createElement('canvas');
const pOffCtx = pOff.getContext('2d');
const P_SIZE = 128;
pOff.width = pOff.height = P_SIZE;
let plasmaT = 0;
const C1=[0,255,255], C2=[124,255,0], C3=[255,77,255];

function drawPlasmaTexture() {
  const imgD = pOffCtx.createImageData(P_SIZE, P_SIZE);
  const d = imgD.data;
  for (let y=0; y<P_SIZE; y++) for (let x=0; x<P_SIZE; x++) {
    const nx=x/P_SIZE, ny=y/P_SIZE;
    const v = Math.sin(nx*7+plasmaT)*0.2 + Math.sin(ny*5-plasmaT*0.7)*0.2
            + Math.sin((nx+ny)*6+plasmaT*0.5)*0.3
            + Math.sin(Math.sqrt((nx-.5)**2+(ny-.5)**2)*12-plasmaT)*0.3;
    const nv=(v+1)/2;
    let r,g,b;
    if(nv<.333){const t=nv/.333; r=C1[0]+(C2[0]-C1[0])*t; g=C1[1]+(C2[1]-C1[1])*t; b=C1[2]+(C2[2]-C1[2])*t;}
    else if(nv<.666){const t=(nv-.333)/.333; r=C2[0]+(C3[0]-C2[0])*t; g=C2[1]+(C3[1]-C2[1])*t; b=C2[2]+(C3[2]-C2[2])*t;}
    else{const t=(nv-.666)/.334; r=C3[0]+(C1[0]-C3[0])*t; g=C3[1]+(C1[1]-C3[1])*t; b=C3[2]+(C1[2]-C3[2])*t;}
    const i=(y*P_SIZE+x)*4;
    d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=255;
  }
  pOffCtx.putImageData(imgD, 0, 0);
}

function composePlasma() {
  const w = plasmaCanvas.width, h = plasmaCanvas.height;
  plasmaCtx.clearRect(0, 0, w, h);
  // Draw white background first so plasma colors show up
  plasmaCtx.fillStyle = '#ffffff';
  plasmaCtx.fillRect(0, 0, w, h);
  
  const tileW = Math.max(w, h), dpr = window.devicePixelRatio || 1;
  plasmaCtx.globalAlpha = 0.5;
  const offsetX = (state.plasmaPanX * 0.4 * dpr) % tileW, offsetY = (state.plasmaPanY * 0.4 * dpr) % tileW;
  let sX = offsetX > 0 ? offsetX - tileW : offsetX, sY = offsetY > 0 ? offsetY - tileW : offsetY;
  
  // Draw tiles
  plasmaCtx.drawImage(pOff, sX, sY, tileW, tileW); 
  plasmaCtx.drawImage(pOff, sX + tileW, sY, tileW, tileW); 
  plasmaCtx.drawImage(pOff, sX, sY + tileW, tileW, tileW); 
  plasmaCtx.drawImage(pOff, sX + tileW, sY + tileW, tileW, tileW);
}

setInterval(()=>{ plasmaT+=0.06; drawPlasmaTexture(); composePlasma(); }, 100);

// --- Chunk System ---
const CHUNK_SIZE = 512;
const chunks = new Map();

function getChunk(cx, cy) {
  const key=`${cx},${cy}`;
  if (!chunks.has(key)) {
    const c=document.createElement('canvas');
    c.width=c.height=CHUNK_SIZE;
    chunks.set(key, c);
  }
  return chunks.get(key);
}

// --- Undo/Redo ---
const MAX_HISTORY = 30;
const undoStack = []; 
const redoStack = [];

function snapshotChunks(keys) {
  const snap = [];
  for (const key of keys) {
    if (chunks.has(key)) {
      const c = chunks.get(key);
      snap.push({ key, data: c.getContext('2d').getImageData(0,0,CHUNK_SIZE,CHUNK_SIZE) });
    } else {
      snap.push({ key, data: null });
    }
  }
  return snap;
}

function pushUndo(snap) {
  undoStack.push(snap);
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  redoStack.length = 0;
  updateUndoButtons();
}

function applySnapshot(snap) {
  for (const { key, data } of snap) {
    if (data === null) {
      chunks.delete(key);
    } else {
      if (!chunks.has(key)) {
        const c=document.createElement('canvas');
        c.width=c.height=CHUNK_SIZE;
        chunks.set(key, c);
      }
      chunks.get(key).getContext('2d').putImageData(data,0,0);
    }
  }
}

function undo() {
  if (!undoStack.length) return;
  const snap = undoStack.pop();
  const redoSnap = snap.map(({key}) => ({
    key,
    data: chunks.has(key) ? chunks.get(key).getContext('2d').getImageData(0,0,CHUNK_SIZE,CHUNK_SIZE) : null
  }));
  redoStack.push(redoSnap);
  applySnapshot(snap);
  updateUndoButtons();
  render();
}

function redo() {
  if (!redoStack.length) return;
  const snap = redoStack.pop();
  const undoSnap = snap.map(({key}) => ({
    key,
    data: chunks.has(key) ? chunks.get(key).getContext('2d').getImageData(0,0,CHUNK_SIZE,CHUNK_SIZE) : null
  }));
  undoStack.push(undoSnap);
  applySnapshot(snap);
  updateUndoButtons();
  render();
}

function updateUndoButtons() {
  btnUndo.disabled = undoStack.length === 0;
  btnRedo.disabled = redoStack.length === 0;
}

// --- State ---
const state = {
  tool:'pen', size:25, zoomFix:50,
  zoom:1, panX:0, panY:0,
  plasmaPanX:0, plasmaPanY:0, // Sync plasma with pan
  drawing:false, currentShape:null,
  spaceDown:false, panning:false,
  lastPX:0, lastPY:0,
  mouseX:0, mouseY:0,
  lastWorldX:0, lastWorldY:0,
  pendingKeys: new Set()
};

// --- Coordinate transforms ---
const s2w=(sx,sy)=>({ x:(sx-state.panX)/state.zoom, y:(sy-state.panY)/state.zoom });
const w2s=(wx,wy)=>({ x:wx*state.zoom+state.panX, y:wy*state.zoom+state.panY });

function calcWorldSize() {
  const zFix=state.zoomFix/100;
  return ((state.size*state.zoom)*(1-zFix) + state.size*zFix) / state.zoom;
}

// --- Canvas resize ---
function resize() {
  const dpr=window.devicePixelRatio||1;
  const w=wrap.clientWidth, h=wrap.clientHeight;
  
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.resetTransform(); ctx.scale(dpr,dpr);
  
  plasmaCanvas.width=w*dpr; plasmaCanvas.height=h*dpr;
  plasmaCanvas.style.width=w+'px'; plasmaCanvas.style.height=h+'px';
  
  render();
}
new ResizeObserver(resize).observe(wrap);

// --- Drawing Logic ---
function drawOnChunk(wx, wy, tool, size) {
  const cx = Math.floor(wx / CHUNK_SIZE);
  const cy = Math.floor(wy / CHUNK_SIZE);
  const key = `${cx},${cy}`;
  
  const chunk = getChunk(cx, cy);
  const cCtx = chunk.getContext('2d');
  
  // Transform world coords to chunk local coords
  const lx = wx - cx * CHUNK_SIZE;
  const ly = wy - cy * CHUNK_SIZE;

  cCtx.save();
  cCtx.lineCap = 'round';
  cCtx.lineJoin = 'round';
  cCtx.lineWidth = size;

  if (tool === 'eraser') {
    cCtx.globalCompositeOperation = 'destination-out';
    cCtx.strokeStyle = 'rgba(0,0,0,1)';
  } else if (tool === 'plasma') {
    // Plasma tool draws white, background provides color
    cCtx.globalCompositeOperation = 'source-over';
    cCtx.strokeStyle = '#ffffff';
    // Add a glow effect locally
    cCtx.shadowBlur = size * 0.5;
    cCtx.shadowColor = 'white';
  } else {
    cCtx.globalCompositeOperation = 'source-over';
    cCtx.strokeStyle = 'white';
  }

  cCtx.beginPath();
  cCtx.moveTo(state.lastWorldX - cx * CHUNK_SIZE, state.lastWorldY - cy * CHUNK_SIZE);
  cCtx.lineTo(lx, ly);
  cCtx.stroke();
  cCtx.restore();
  
  state.pendingKeys.add(key);
}

// --- Render ---
function render() {
  const w=wrap.clientWidth, h=wrap.clientHeight;
  ctx.clearRect(0,0,w,h);
  
  // 1. Draw Chunks
  // Optimization: If zoom is very low, iterating the viewport loop is slow (infinite world).
  // Instead, iterate the Map of existing chunks.
  if (state.zoom < 0.1) {
      for (const [key, chunkCanvas] of chunks) {
          const [cx, cy] = key.split(',').map(Number);
          const wx = cx * CHUNK_SIZE;
          const wy = cy * CHUNK_SIZE;
          
          const sx = wx * state.zoom + state.panX;
          const sy = wy * state.zoom + state.panY;
          const sw = CHUNK_SIZE * state.zoom;
          const sh = CHUNK_SIZE * state.zoom;

          // Culling
          if (sx + sw < 0 || sx > w || sy + sh < 0 || sy > h) continue;

          // Fix Rasterization: Use Math.round to prevent sub-pixel blurring/gaps
          ctx.drawImage(chunkCanvas, Math.round(sx), Math.round(sy), Math.round(sw), Math.round(sh));
      }
  } else {
      // Standard Viewport Loop (Fast for normal zoom levels)
      const tl=s2w(0,0), br=s2w(w,h);
      // Safety cap to prevent infinite loops if math goes wrong
      const maxIter = 5000; 
      
      for(let cx=Math.floor(tl.x/CHUNK_SIZE); cx<=Math.floor(br.x/CHUNK_SIZE); cx++){
          if(cx - Math.floor(tl.x/CHUNK_SIZE) > maxIter) break; // Break if range is insane
          for(let cy=Math.floor(tl.y/CHUNK_SIZE); cy<=Math.floor(br.y/CHUNK_SIZE); cy++){
              if(cy - Math.floor(tl.y/CHUNK_SIZE) > maxIter) break;
              
              const key=`${cx},${cy}`;
              if(chunks.has(key)){
                  const sp=w2s(cx*CHUNK_SIZE,cy*CHUNK_SIZE);
                  // Fix Rasterization
                  ctx.drawImage(chunks.get(key), Math.round(sp.x), Math.round(sp.y), Math.round(CHUNK_SIZE*state.zoom), Math.round(CHUNK_SIZE*state.zoom));
              }
          }
      }
  }

  // 2. Draw Current Shape (Rect/Circle preview)
  if(state.currentShape){
    ctx.save();
    ctx.globalCompositeOperation='source-over';
    const p0=w2s(state.currentShape.start.x,state.currentShape.start.y);
    const p1=w2s(state.currentShape.end.x,state.currentShape.end.y);
    const rs=state.currentShape.size*state.zoom;
    ctx.strokeStyle='white'; ctx.lineWidth=rs; ctx.beginPath();
    if(state.tool==='rect'){ ctx.strokeRect(p0.x,p0.y,p1.x-p0.x,p1.y-p0.y); }
    else { const dx=p1.x-p0.x,dy=p1.y-p0.y; ctx.arc(p0.x,p0.y,Math.sqrt(dx*dx+dy*dy),0,Math.PI*2); ctx.stroke(); }
    ctx.restore();
  }

  // 3. Cursor
  const x=state.mouseX, y=state.mouseY;
  if(x>=0 && y>=0){
    const r=(calcWorldSize()*state.zoom)*0.5;
    ctx.save(); ctx.strokeStyle='rgba(0,255,180,0.8)'; ctx.lineWidth=1;
    if(r>1){ ctx.setLineDash([3,3]); ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke(); }
    ctx.setLineDash([]); ctx.beginPath(); ctx.moveTo(x-6,y); ctx.lineTo(x+6,y); ctx.moveTo(x,y-6); ctx.lineTo(x,y+6); ctx.stroke();
    ctx.restore();
  }

  // Status
  const wp=s2w(state.mouseX,state.mouseY);
  statusL.textContent=`Pos: ${Math.round(wp.x)},${Math.round(wp.y)}`;
  statusR.textContent=`Chunks: ${chunks.size} | Zoom: ${state.zoom.toFixed(4)}x`;
  zoomDisp.textContent=state.zoom.toFixed(2)+'x';
}

// --- Input ---
function getPos(e){ const r=canvas.getBoundingClientRect(); return{x:e.clientX-r.left,y:e.clientY-r.top}; }

window.addEventListener('keydown', e => {
  if(e.code==='Space'){ state.spaceDown=true; e.preventDefault(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='z'){ e.preventDefault(); undo(); return; }
  if((e.ctrlKey||e.metaKey) && (e.key==='y'||e.key==='Y'||e.key==='Z')){ e.preventDefault(); redo(); return; }
});
window.addEventListener('keyup', e=>{ if(e.code==='Space') state.spaceDown=false; });

canvas.addEventListener('pointerdown', e=>{
  if(e.button===1||state.spaceDown){ state.panning=true; state.lastPX=e.clientX; state.lastPY=e.clientY; return; }
  const p=getPos(e), wp=s2w(p.x,p.y);
  state.drawing=true;
  state.lastWorldX=wp.x; state.lastWorldY=wp.y;
  state.pendingKeys.clear();
  const wSize=calcWorldSize();
  if(state.tool==='rect'||state.tool==='circle'){
    state.currentShape={start:wp,end:wp,size:wSize};
  } else {
    // Snapshot before drawing
    const cx = Math.floor(wp.x / CHUNK_SIZE);
    const cy = Math.floor(wp.y / CHUNK_SIZE);
    const preSnap=snapshotChunks([`${cx},${cy}`]);
    state._strokeSnap=preSnap;
    // Draw initial dot
    drawOnChunk(wp.x, wp.y, state.tool, wSize);
  }
  canvas.setPointerCapture(e.pointerId);
  render();
});

canvas.addEventListener('pointermove', e=>{
  const p=getPos(e); state.mouseX=p.x; state.mouseY=p.y;
  if(state.panning){
    const dx=e.clientX-state.lastPX, dy=e.clientY-state.lastPY;
    state.panX+=dx; state.panY+=dy; 
    state.plasmaPanX+=dx; state.plasmaPanY+=dy; // Sync plasma pan
    state.lastPX=e.clientX; state.lastPY=e.clientY;
    render(); return;
  }
  if(state.drawing){
    const wp=s2w(p.x,p.y);
    if(state.tool==='rect'||state.tool==='circle'){
      state.currentShape.end=wp;
    } else {
      // Draw segment
      drawOnChunk(wp.x, wp.y, state.tool, calcWorldSize());
      state.lastWorldX=wp.x; state.lastWorldY=wp.y;
    }
  }
  render();
});

canvas.addEventListener('pointerup', ()=>{
  if(state.drawing){
    if(state.currentShape){
      const s=state.currentShape;
      // Snapshot area
      const allKeys=new Set();
      const p0=s.start, p1=s.end;
      const x0=Math.min(p0.x,p1.x)-s.size, x1=Math.max(p0.x,p1.x)+s.size;
      const y0=Math.min(p0.y,p1.y)-s.size, y1=Math.max(p0.y,p1.y)+s.size;
      for(let cx=Math.floor(x0/CHUNK_SIZE); cx<=Math.floor(x1/CHUNK_SIZE); cx++)
        for(let cy=Math.floor(y0/CHUNK_SIZE); cy<=Math.floor(y1/CHUNK_SIZE); cy++)
          allKeys.add(`${cx},${cy}`);
      pushUndo(snapshotChunks(allKeys));

      if(state.tool==='rect'){
        const corners=[s.start,{x:s.end.x,y:s.start.y},s.end,{x:s.start.x,y:s.end.y},s.start];
        for(let i=0;i<4;i++){
            state.lastWorldX = corners[i].x; state.lastWorldY = corners[i].y;
            drawOnChunk(corners[i+1].x, corners[i+1].y, 'pen', s.size);
        }
      } else {
        const dx=s.end.x-s.start.x, dy=s.end.y-s.start.y;
        const radius=Math.sqrt(dx*dx+dy*dy);
        const steps=Math.max(20,Math.floor(radius*0.5));
        let lastP={x:s.start.x+radius,y:s.start.y};
        for(let i=1;i<=steps;i++){
          const angle=(i/steps)*Math.PI*2;
          const nextP={x:s.start.x+Math.cos(angle)*radius,y:s.start.y+Math.sin(angle)*radius};
          state.lastWorldX = lastP.x; state.lastWorldY = lastP.y;
          drawOnChunk(nextP.x, nextP.y, 'pen', s.size);
          lastP=nextP;
        }
      }
      state.currentShape=null;
    } else if(state._strokeSnap){
      // For freehand: combine initial snap with new keys
      const existingKeys=new Set(state._strokeSnap.map(s=>s.key));
      const newKeys=[...state.pendingKeys].filter(k=>!existingKeys.has(k));
      const fullSnap=[...state._strokeSnap, ...snapshotChunks(newKeys)];
      pushUndo(fullSnap.map(({key,data})=>{
        if(newKeys.includes(key)) return{key,data:null};
        return{key,data};
      }));
      state._strokeSnap=null;
    }
    state.pendingKeys.clear();
  }
  state.drawing=false; state.panning=false;
  render();
});

canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const p=getPos(e), f=e.deltaY<0?1.15:1/1.15;
  const nz=Math.max(0.0001,Math.min(10000,state.zoom*f));
  state.panX=p.x-(p.x-state.panX)*(nz/state.zoom);
  state.panY=p.y-(p.y-state.panY)*(nz/state.zoom);
  state.zoom=nz; render();
},{passive:false});

sizeSlider.addEventListener('input',e=>{ state.size=Math.pow(parseFloat(e.target.value),2); sizeLabel.textContent=Math.round(state.size); render(); });
zoomFixSlider.addEventListener('input',e=>{ state.zoomFix=parseInt(e.target.value); zoomFixLabel.textContent=state.zoomFix+'%'; render(); });

function setTool(t){ state.tool=t; document.querySelectorAll('.tool-btn[data-tool]').forEach(b=>b.classList.toggle('active',b.dataset.tool===t)); }
document.querySelectorAll('.tool-btn[data-tool]').forEach(b=>b.addEventListener('click',()=>setTool(b.dataset.tool)));

document.getElementById('btn-clear').addEventListener('click',()=>{ pushUndo(snapshotChunks(chunks.keys())); chunks.clear(); render(); });
document.getElementById('btn-reset-view').addEventListener('click',()=>{ state.zoom=1; state.panX=0; state.panY=0; state.plasmaPanX=0; state.plasmaPanY=0; render(); });
btnUndo.addEventListener('click', undo);
btnRedo.addEventListener('click', redo);

document.getElementById('btn-save').addEventListener('click',()=>{
  const exportedChunks=Array.from(chunks.entries()).map(([key,c])=>[key,c.toDataURL()]);
  const data={type:'chunked',chunks:exportedChunks,view:{zoom:state.zoom,panX:state.panX,panY:state.panY}};
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'})); a.download='nirin_paint.json'; a.click();
});

document.getElementById('btn-load').addEventListener('click',()=>{
  const input=document.createElement('input'); input.type='file';
  input.onchange=e=>{
    const reader=new FileReader();
    reader.onload=re=>{
      const data=JSON.parse(re.target.result);
      if(data.type==='chunked'){
        chunks.clear(); undoStack.length=0; redoStack.length=0; updateUndoButtons();
        let n=0;
        data.chunks.forEach(([key,url])=>{
          const img=new Image();
          img.onload=()=>{
            const c=document.createElement('canvas'); c.width=c.height=CHUNK_SIZE;
            c.getContext('2d').drawImage(img,0,0); chunks.set(key,c);
            if(++n===data.chunks.length) render();
          };
          img.src=url;
        });
        state.zoom=data.view.zoom; state.panX=data.view.panX; state.panY=data.view.panY;
      } else { alert("Inkompatibles Format."); }
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
});

document.getElementById('btn-export').addEventListener('click',()=>{
  const temp=document.createElement('canvas'); temp.width=canvas.width; temp.height=canvas.height;
  const tCtx=temp.getContext('2d');
  tCtx.fillStyle='#050608'; tCtx.fillRect(0,0,temp.width,temp.height);
  tCtx.drawImage(plasmaCanvas, 0, 0); // Include plasma in export
  tCtx.drawImage(canvas,0,0);
  const a=document.createElement('a'); a.href=temp.toDataURL(); a.download='export.png'; a.click();
});

document.getElementById('btn-new').addEventListener('click',()=>location.reload());

updateUndoButtons();
resize();
})();
</script>
</body>
</html>
